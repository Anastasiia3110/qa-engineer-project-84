- summary: |
    Проверка адаптивной верстки и корректного отображения сайта на мобильном устройстве
  requirement: |
    Сайт должен иметь адаптивную верстку и корректно отображаться на мобильных устройствах
  prerequisites:
    Открыто приложение на смартфоне или в режиме Mobile View (DevTools)
  test-data: |
    Размер экрана: iPhone SE (375×667)
  steps:
    - Открыть главную страницу приложения
    - Проверить отображение главной страницы
    - Открыть карточку любого товара
    - Проверить отображение страницы товара
    - Открыть корзину
    - Проверить отображение страницы корзины
  expected-result: |
    Главная страница, страница товара и корзина корректно отображаются на мобильном устройстве. Интерфейс адаптирован под размер экрана. Отсутствуют наложения элементов. Кнопки и поля ввода доступны для взаимодействия

- summary: |
    Проверка работы приложения в режиме SPA
  requirement: |
    Приложение должно быть реализовано как SPA (Single Page Application) без полной перезагрузки страницы
  prerequisites:
    Открыто приложение
  test-data: |
    Не требуются
  steps:
    - Открыть главную страницу приложения
    - Перейти в карточку любого товара
    - Вернуться в каталог товаров
    - Открыть корзину
    - Вернуться в каталог товаров
  expected-result: |
    При переходе между разделами приложения не происходит полной перезагрузки страницы. Навигация между разделами выполняется без обновления страницы
    
- summary: |
    Проверка совместимости с последними версиями браузеров
  requirement: |
    Сайт должен быть протестирован на совместимость с последними версиями браузеров
  prerequisites:
    Доступны последние версии браузеров Google Chrome и Mozilla Firefox
  test-data: |
    Браузеры:
    - Google Chrome (последняя версия)
    - Mozilla Firefox (последняя версия)
  steps:
    - Открыть приложение в Google Chrome
    - Проверить отображение главной страницы
    - Проверить работу поиска товаров
    - Открыть карточку любого товара
    - Добавить товар в корзину
    - Открыть корзину
    - Открыть приложение в Mozilla Firefox
    - Проверить отображение главной страницы
    - Проверить работу поиска товаров
    - Открыть карточку любого товара
    - Добавить товар в корзину
    - Открыть корзину
  expected-result: |
    В Google Chrome и Mozilla Firefox приложение корректно отображается. Главная страница, каротчка товара и корзина отображаются без ошибок. Поиск товаров, открытие карточки товара и добавление товара в корзину работают корректно в обоих браузерах

