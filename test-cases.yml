    Пользователь должен иметь возможность искать товары по ключевому слову
  prerequisites: |
    Открыто приложение
  test-data: |
    Тестовые данные
    Ключевое слово: "Powder"
  steps:
    - Ввести "Powder" в поле поиска
  expected-result: |
    Отображаются товары, соответствующие введенному ключевому слову

