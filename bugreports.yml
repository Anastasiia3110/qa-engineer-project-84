---
- summary: |
    Поиск товаров выполняется только по товарам текущей страницы каталога
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Ввести в поле поиска название товара, расположенного не на первой странице каталога
    3. Просмотреть результаты поиска
    4. Перейти на следующую страницу
  expected-result: |
    После ввода ключевого слова отображаются все товары, соответствуюшие поисковому запросу, независимо от страницы каталога
  actual-result: |
    После ввода ключевого слова отображаются только товары, находящиеся на текущей странице каталога. Остальные подходящие товары доступны только после ручного перехода на следующую страницу

- summary: |
    Список категорий зависит от текущей страницы каталога
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Просмотреть список категорий на первой странице
    3. Перейти на следующую страницу каталога
    4. Снова открыть список категорий
  expected-result: |
    Отображается полный и одинаковый список категорий независимо от текущей страницы каталога
  actual-result: |
    Список категорий изменяется при переходе между страницами каталога. На разных страницах отображаются разные категории

- summary: |
    При нажатии на хэштег категории на странице товара не открывается каталог товаров выбранной категории
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Открыть карточку любого товара
    3. Нажать на хэштег категории
  expected-result: |
    Открывается каталог товаров выбранной категории
  actual-result: |
    При нажатии на хэштег категории переход не выполняется, каталог товаров выбранной категории не открывается

