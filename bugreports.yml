---
- summary: |
    Поиск по ключевому слову не отображает найденные товары на текущей странице каталога
  environment: |
    Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
    2. Ввести в поле поиска значение milk 
    3. Проверить результаты поиска на текущей странице каталога
  expected-result: |
    После ввода поискового запроса отображаются все товары, соответсвующие запросу, независимо от страницы каталога
  actual-result: |
    После ввода поискового запроса "milk" товары не отображаются на текущей странице. Для просмотра найденных товаров необходимо вручную переключить страницу каталога

- summary: |
    Выпадающий список категорий отображает только категории товаров текущей страницы каталога
  environment: |
    Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
    2. Открыть выпадающий список категорий
    3. Запомнить доступные категории
    4. Перейти на следующую страницу каталога с помощью кнопки Next
    5. Снова открыть выпадающий список категорий
  expected-result: |
    Выпадающий список содержит все доступные категории товаров независимо от текущей страницы каталога
  actual-result: |
    Состав выпадающего списка категорий изменяется при переключении страниц каталога. Пользователю отображаются только категории товаров, присутствующих на текущей странице

- summary: |
    Список брендов отображает только бренды товаров текущей страницы каталога
  environment: |
    Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
    2. Просмотреть список брендов в блоке Brand
    3. Перейти на следующую страницу каталога с помощью кнопки Next
    4. Повторно посмотреть список брендов
  expected-result: |
    Список брендов содержит все доступные бренды товаров независимо от текущей страницы каталога
  actual-result: |
    Список брендов изменяется при переключении страниц каталога. Пользователю отображаются только бренды товаров, присутствующих на текущей странице

- summary: |
    Фильтрация по диапазону цен отображает товары только на текущей странице
  environment: |
    Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
    2. Установить диапазон цен
    3. Проверить отображаемые товары
  expected-result: |
    После применения диапазона цен отображаются все товары, соответствующие выбранному диапазону, независимо от страницы каталога
  actual-result: |
    После применения диапазона цен отображаются только товары текущей страницы каталога. Для просмотра остальных товаров необходимо переходить между страницами

- summary: |
    После переключения языка на русский часть текстовых элементов страницы остается на английском языке
  environment: |
    Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
    2. Переключить язык интерфейса на русский
    3. Проверить содержимое карточек товаров
  expected-result: |
    Все текстовые элементы страницы отображаются на русском языке
  actual-result: |
    Элементы интерфейса переведены на русский язык, однако названия и описания товаров продолжают отображаться на английском языке

- summary: |
    Сайт не адаптирован для мобильных устройств
  environment: |
    Mobile View (DevTools)
  steps-to-reproduce: |
    1. Открыть сайт https://products-store.hexlet.app на мобильном устройстве или в режиме мобильного устройства в DevTools
    2. Проверить отображение интерфейса
  expected-result: |
    Интерфейс адаптируется под размер экрана мобильного устройства. Элементы страницы удобно отражаются и доступны для взаимодействия
  actual-result: |
    На мобильном устройстве отображается уменьшенная версия десктопного интерфейса. Фильтры занимают значительную часть экрана, карточки товаров сжаты, что затрудняет просмотр и взаимодействие с элементами страницы

- summary: |
    Выбранный язык интерфейса не сохраняется после обновления страницы
  environment: |
    Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть сайт https://products-store.hexlet.app
    2. Переключить язык интерфейса на русский или испанский
    3. Обновить страницу браузера
  expected-result: |
    После обновления страницы сохраняется ранее выбранный язык интерфейса
  actual-result: |
    После обновления страницы язык интерфейса сбрасывается на язык по умолчанию

- summary: |
    После смены языка интерфейса на русский на странице остаются элементы на английском языке
  environment: |
    Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть сайт https://products-store.hexlet.app
    2. Переключить язык интерфейса на русский
    3. Проверить текстовые элементы страницы
  expected-result: |
    После смены языка все элементы страницы отображаются на русском языке
  actual-result: |
    После смены языка интерфейс и элементы навигации отображаются на русском языке, однако назвавния и описания товаров остаются на английском языке
