- summary: |
    В каталоге товаров не отображается рейтинг товара
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Посмотреть карточки товаров в каталоге
    3. Открыть карточку любого товара
  expected-result: |
    Рейтинг товаров отображается как в каталоге товаров, так и на странице товара
  actual-result: |
    В каталоге товаров рейтинг отсутствует. После открытия карточки товара рейтинг отображается
    
- summary: |
    Фильтр "In Stock" отображает товары только с текущей странице каталога
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Установить флажок "In Stock"
    3. Просмотреть результаты фильтрации
    4. Перейти на следующую страницу каталога
  expected-result: |
    После применения фильтра отображаются все товары, соответствующие выбранному условию, независимо от страницы каталога
  actual-result: |
    Фильтр применяется только к товарам текущей страницы. Для просмотра остальных товаров необходимо вручную переходить между страницами каталога

- summary: |
    Товар, отсутствующий в наличии, можно добавить в корзину со страницы товара
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Найти товар, отсутствующий в наличии
    3. Открыть карточку товара
    4. Нажать кнопку "Add to cart"
  expected-result: |
    Для товара, отсутствующего в наличии, отсутствует возможность добавить его в корзину
  actual-result: |
    В карточке товара отображается кнопка "Add to cart". После нажатия товар успешно добавляется в корзину

- summary: |
    Фильтр по цене отображает товары только с текущей страницы каталога
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Установить диапазон цен
    3. Просмотреть результаты фильтрации
    4. Перейти на следующую страницу каталога
  expected-result: |
    После применения фильтра отображаются все товары, соответствующие заданному диапазону цен, независимо от страницы каталога
  actual-result: |
    Фильтр применяется только к товарам текущей страницы. Для просмотра остальных товаров, соответствующих заданному диапазону цен, необходимо вручную переходить между страницами каталога

- summary: |
    После нажатия кнопки "Checkout" не выполняется переход на страницу оплаты
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Добавить любой товар в корзину
    2. Открыть корзину
    3. Нажать кнопку "Checkout"
  expected-result: |
    Выполняется переход на страницу оплаты заказа
  actual-result: |
    После нажатия кнопки Checkout отображается сообщение об успешном оформлении заказа. Переход на страницу оплаты не выполняется

- summary: |
    При оформлении заказа сервер возвращает ошибку 500 Internal Server Error
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение
    2. Добавить любой товар в корзину
    3. Открыть DevTools → вкладка Network
    4. Нажать кнопку Checkout
    5. Проверить сетевой запрос оформления заказа
  expected-result: |
    Запрос на оформление заказа успешно выполняется, сервер возвращает успешный статус (например, 200 ОК или другой ожидаемый успешный код)
  actual-result: |
    При оформлении заказа сервер возвращает ошибку 500 Internal Server Error, несмотря на то что пользователю отображается сообщение об успешном оформлении заказа

- summary: |
    Названия категорий не локализуются при переключении сайта на русский язык
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение
    2. Переключить язык интерфейса на русский
    3. Открыть список категорий
  expected-result: |
    Названия всех категорий отображаются на русском языке
  actual-result: |
    Элементы интерфейса переведены на русский язык, но названия категорий отображаются на английском языке
    
- summary: |
    В выпадающем списке выбора языка для English отображается дублирующееся название языка и отсутствует иконка флага
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение
    2. Нажать на кнопку Language
    3. Просмотреть пункт English в выпадающем списке
  expected-result: |
    В списке отображается название English и соответствующая иконка флага
  actual-result: |
    В списке отображается English English, при этом иконка флага отсутствует
    
- summary: |
    Интерфейс приложения неккоректно отображается на мобильном устройстве
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит) DevTools (iPhone XR 414×896)
  steps-to-reproduce: |
    1. Открыть приложение в режиме мобильного устройства (iPhone XR)
    2. Просмотреть главную страницу
    3. Открыть карточку любого товара
    4. Добавить товар в корзину
    5. Открыть страницу корзины
  expected-result: |
    Главная страница, карточка товара и корзина корректно отображаются на мобильном устройстве. Все элементы интерфейса полностью помещаются в области экрана, не накладываются друг на друга и отображаются без смещений
  actual-result: |
    На мобильном устройстве интерфейс отображается неккоректно:
    - В корзине строка с товаром отображается не полностью 
    - Цена товара и количество (qty) накладываются друг на друга
    - Кнопка "Checkout" отображается со смещением относительно остальных элементов интерфейса
    - Поле поиска отображается не полностью и выходит за границы области интерфейса
    - Кнопки "Add to cart" в карточках товаров выходят за границы карточек товара и отображаются неккоректно
    - Символ "$" отображается на отдельной строке под общей стоимостью заказа
    - https://github.com/Anastasiia3110/qa-engineer-project-84/blob/41744d11bb49ff322d8cbf1cd2a0b27862fc34f8/screenshots/%D0%A1%D0%BD%D0%B8%D0%BC%D0%BE%D0%BA%20%D1%8D%D0%BA%D1%80%D0%B0%D0%BD%D0%B0%202026-07-03%20225826.png
    - https://github.com/Anastasiia3110/qa-engineer-project-84/blob/41744d11bb49ff322d8cbf1cd2a0b27862fc34f8/screenshots/%D0%A1%D0%BD%D0%B8%D0%BC%D0%BE%D0%BA%20%D1%8D%D0%BA%D1%80%D0%B0%D0%BD%D0%B0%202026-07-03%20225715.png

- summary: |
    Названия и описания товакров не локализуются при переключении сайта на русский язык
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Переключить язык интерфейса на "Russian"
    3. Просмотреть каталог товаров
    4. Открыть карточку любого товара
  expected-result: |
    Все элементы интерфейса и содержимое сайта отображаются на русском языке, включая названия товаров и их описания 
  actual-result: |
    На русский язык переводятся только элементы интерфейса (кнопки, меню, фильтры и другие элементы навигаци). Названия товаров и их описания остаются на английском языке
