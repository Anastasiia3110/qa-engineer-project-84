  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Просмотреть список производителей на первой странице каталога
    3. Перейти на следующую страницу каталога
    4. Снова просмотреть список производителей
  expected-result: |
    Отображается полный и одинаковый список производителей независимо от текущей страницы каталога
