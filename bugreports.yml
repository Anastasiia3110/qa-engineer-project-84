---
- summary: |
    Поиск товаров выполняется только по товарам текущей страницы каталога
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Ввести в поле поиска название товара, расположенного не на первой странице каталога
    3. Просмотреть результаты поиска
    4. Перейти на следующую страницу
  expected-result: |
    После ввода ключевого слова отображаются все товары, соответствуюшие поисковому запросу, независимо от страницы каталога
  actual-result: |
    После ввода ключевого слова отображаются только товары, находящиеся на текущей странице каталога. Остальные подходящие товары доступны только после ручного перехода на следующую страницу

- summary: |
    Список категорий зависит от текущей страницы каталога
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Просмотреть список категорий на первой странице
    3. Перейти на следующую страницу каталога
    4. Снова открыть список категорий
  expected-result: |
    Отображается полный и одинаковый список категорий независимо от текущей страницы каталога
  actual-result: |
    Список категорий изменяется при переходе между страницами каталога. На разных страницах отображаются разные категории

- summary: |
    При нажатии на хэштег категории на странице товара не открывается каталог товаров выбранной категории
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Открыть карточку любого товара
    3. Нажать на хэштег категории
  expected-result: |
    Открывается каталог товаров выбранной категории
  actual-result: |
    При нажатии на хэштег категории переход не выполняется, каталог товаров выбранной категории не открывается

- summary: |
    Список производителей зависит от текущей страницы каталога
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Просмотреть список производителей на первой странице каталога
    3. Перейти на следующую страницу каталога
    4. Снова просмотреть список производителей
  expected-result: |
    Отображается полный и одинаковый список производителей независимо от текущей страницы каталога
  actual-result: |
    Список производителей изменяется при переходе между страницами каталога. На разных страницах отображаются разные производители или совсем не отображаются

- summary: |
    В списке производителей отображается чекбокс без названия производителя
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Перейти к списку производителей
    3. Просмотреть все элементы списка производителей
  expected-result: |
    Каждый чекбокс производителя имеет корректное название
  actual-result: |
    В списке производителей отображается чекбокс без названия производителя
    
- summary: |
    Фильтр "In Stock" отображает товары только с текущей странице каталога
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Установить флажок "In Stock"
    3. Просмотреть результаты фильтрации
    4. Перейти на следующую страницу каталога
  expected-result: |
    После применения фильтра отображаются все товары, соответствующие выбранному условию, независимо от страницы каталога
  actual-result: |
    Фильтр применяется только к товарам текущей страницы. Для просмотра остальных товаров необходимо вручную переходить между страницами каталога

- summary: |
    Товар, отсутствующий в наличии, можно добавить в корзину со страницы товара
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Найти товар, отсутствующий в наличии
    3. Открыть карточку товара
    4. Нажать кнопку "Add to cart"
  expected-result: |
    Для товара, отсутствующего в наличии, отсутствует возможность добавить его в корзину
  actual-result: |
    В карточке товара отображается кнопка "Add to cart". После нажатия товар успешно добавляется в корзину

- summary: |
    Фильтр по цене отображает товары только с текущей страницы каталога
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Установить диапазон цен
    3. Просмотреть результаты фильтрации
    4. Перейти на следующую страницу каталога
  expected-result: |
    После применения фильтра отображаются все товары, соответствующие заданному диапазону цен, независимо от страницы каталога
  actual-result: |
    Фильтр применяется только к товарам текущей страницы. Для просмотра остальных товаров, соответствующих заданному диапазону цен, необходимо вручную переходить между страницами каталога

- summary: |
    После нажатия кнопки "Checkout" не выполняется переход на страницу оплаты
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Добавить любой товар в корзину
    2. Открыть корзину
    3. Нажать кнопку "Checkout"
  expected-result: |
    Выполняется переход на страницу оплаты заказа
  actual-result: |
    После нажатия кнопки Checkout отображается сообщение об успешном оформлении заказа. Переход на страницу оплаты не выполняется

- summary: |
    В выпадающем списке выбора языка для English отображается дублирующееся название языка и отсутствует иконка флага
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение
    2. Нажать на кнопку Language
    3. Просмотреть пункт English в выпадающем списке
  expected-result: |
    В списке отображается название English и соответствующая иконка флага
  actual-result: |
    В списке отображается English English, при этом иконка флага отсутствует
    
- summary: |
    Сайт некорректно отображается на мобильном устройстве
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Включить режим мобильного устройства в DevTools
    3. Просмотреть отображение интерфейса
  expected-result: |
    Интерфейс сайта корректно адаптирован для мобильного устройства и удобен для использования
  actual-result: |
    Интерфейс сайта отображается некорректно: элементы расположены неудобно, использование на мобильном устройстве затруднено

- summary: |
    После переключения языка на русский часть интерфейса остается на английском языке
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. В выпадающем списке выбрать русский язык
    3. Просмотреть интерфейс приложения
  expected-result: |
    Все элементы интерфейса отображаются на русском языке
  actual-result: |
    После переключения языка названия и описания товаров остаются на английском языке
