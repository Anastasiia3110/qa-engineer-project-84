---
- summary: |
    Поиск товаров выполняется только по товарам текущей страницы каталога
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Ввести в поле поиска название товара, расположенного не на первой странице каталога
    3. Просмотреть результаты поиска
  expected-result: |
    Отображаются все товары, соответствующие поисковому запросу
  actual-result: |
    Отображаются только товары текущей страницы. Для просмотра остальных результатов необходимо перейти на следующую страницу

- summary: |
    Список категорий зависит от текущей страницы каталога
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Просмотреть список категорий
    3. Перейти на следующую страницу каталога
    4. Снова открыть список категорий
  expected-result: |
    Отображается полный список категорий независимо от текущей страницы каталога
  actual-result: |
    Список категорий изменяется при переходе между страницами каталога

- summary: |
    Список производителей зависит от текущей страницы каталога
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Просмотреть список производителей
    3. Перейти на следующую страницу каталога
    4. Снова просмотреть список производителей
  expected-result: |
    Отображается полный список производителей независимо от текущей страницы
  actual-result: |
    Список производителей изменяется при переходе между страницами каталога

- summary: |
    Сайт некорректно отображается на мобильном устройстве
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. Включить режим мобильного устройства в DevTools
    3. Просмотреть отображение интерфейса
  expected-result: |
    Интерфейс сайта корректно адаптирован для мобильного устройства и удобен для использования
  actual-result: |
    Интерфейс сайта отображается некорректно: элементы расположены неудобно, использование на мобильном устройстве затруднено

- summary: |
    После переключения языка на русский часть интерфейса остается на английском языке
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть приложение https://products-store.hexlet.app/
    2. В выпадающем списке выбрать русский язык
    3. Просмотреть интерфейс приложения
  expected-result: |
    Все элементы интерфейса отображаются на русском языке
  actual-result: |
    После переключения языка названия и описания товаров остаются на английском языке
