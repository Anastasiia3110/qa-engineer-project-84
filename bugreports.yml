---
- summary: |
    Поиск по ключевому слову не отображает найденные товары на текущей странице каталога
  environment: |
    Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
    2. Ввести в поле поиска значение milk 
    3. Проверить результаты поиска на текущей странице каталога
  expected-result: |
    После ввода поискового завпроса отображаются все товары, соответсвующие запросу, независимо от страницы каталога
  actual-result: |
    После ввода поискового запроса "milk" товары не отображаются на текущей странице. Для просмотра найденных товаров необходимо вручную переключить страницу каталога

    - summary: |
    Выпадающий список категорий отображает только категории товаров текущей страницы каталога
  environment: |
    Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
    2. Открыть выпадающий список категорий
    3. Запомнить доступные категории
    4. Перейти на следующую страницу каталога с помощью кнопки Next
    5. Снова открыть выпадающий список категорий
  expected-result: |
    Выпадающий список содержит все доступные категории товаров независимо от текущей страницы каталога
  actual-result: |
    Состав выпадающего списка категорий изменяется при переключении страниц каталога. Пользователю отображаются только категории товаров, присутствующих на текущей странице

    - summary: |
    Список брендов отображает только бренды товаров текущей страницы каталога
  environment: |
    Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
    2. Просмотреть список брендов в блоке Brand
    3. Перейти на следующую страницу каталога с помощью кнопки Next
    4. Повторно посмотреть список брендов
  expected-result: |
    Список брендов содержит все доступные бренды товаров независимо от текущей страницы каталога
  actual-result: |
    Список брендов изменяется при переключении страниц каталога. Пользователю отображаются только бренды товаров, присутствующих на текущей странице

    - summary: |
    После переключения языка на русский часть текстовых элементов страницы остается на английском языке
  environment: |
    Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
  steps-to-reproduce: |
    1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
    2. Просмотреть список брендов в блоке Brand
    3. Перейти на следующую страницу каталога с помощью кнопки Next
    4. Повторно посмотреть список брендов
  expected-result: |
    Список брендов содержит все доступные бренды товаров независимо от текущей страницы каталога
  actual-result: |
    Список брендов изменяется при переключении страниц каталога
