bugreports:
  - summary: |
      После выполнения поиска исчезает кнопка Next при наличии найденных товаров на следующих страницах
    environment: |
      Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть приложение https://products-store-v2.hexlet.app/
      2. Ввести в поле поиска ключевое слово товара, который находится на нескольких страницах каталога
      3. Просмотреть результаты поиска
    expected-result: |
      Кнопка Next отображается, если найденные товары находятся на следующих страницах каталога
    actual-result: |
      После выполнения поиска кнопка Next исчезает, несмотря на наличие найденных товаров на следующих страницах каталога

