bugreports:
  - summary: |
      После поиска товара по ключевому слову исчезает кнопка Next
    environment: |
      Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть приложение https://products-store-v2.hexlet.app/
      2. Ввести в поле поиска ключевое слово товара, который находится на нескольких страницах каталога, например "powder"
      3. Просмотреть результаты поиска
    expected-result: |
      Отображаются все товары, соответствующие поисковому запросу. Кнопка "Next" остается доступной, если имеются результаты на следующих страницах каталога
    actual-result: |
      После выполнения поиска отображаются только товары текущей страницы, а кнопка "Next" исчезает. Перейти к результатам поиска, находящимся на следующих страницах каталога, невозможно

  - summary: |
      После сброса фильтра по категории исчезает кнопка "Next"
    environment: |
      Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть приложение https://products-store-v2.hexlet.app/
      2. Выбрать любую категорию
      3. Сбросить выбранную категорию
    expected-result: |
      После сброса фильтра отображается полный каталог товара. Кнопка "Next" остается доступной, если имеются следующие страницы каталога
    actual-result: |
      После сброса фильтра по категории кнопка "Next" исчезает. Перейти на следующую страницу каталога невозможно. Кнопка появляется только после обновления страницы или после открытия карточки товара и возврата в каталог

- summary: |
      После перехода по хэштегу категории из карточки товара каталог не отображает товары выбранной категории
    environment: |
      Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть приложение https://products-store-v2.hexlet.app/
      2. Перейти на вторую (или любую, кроме первой) страницу каталога
      3. Открыть карточку товара
      4. Нажать на хэштег категории
    expected-result: |
      Открывается каталог товаров выбранной категории независимо от страницы, с которой была открыта карточка товара
    actual-result: |
      После нажатия на хэштег выполняется переход на первую страницу каталога. В списке категорий отображается выбранная категория, однако каталог не фильтруется и товары выбранной категории не отображаются. Дополнительно исчезает кнопка "Next"
      
- summary: |
      После применения фильтра по производителю нарушается навигация по страницам каталога
    environment: |
      Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть приложение https://products-store-v2.hexlet.app/
      2. Перейти на вторую или последующую страницу каталога
      3. Выбрать любого производителя
      4. Нажать кнопку "Previous" до возврата на первую страницу каталога
    expected-result: |
      После перехода между страницами каталога выбранный фильтр сохраняется, а кнопки "Previous" и "Next" отображаются корректно в соответствии с доступными страницами
    actual-result: |
      После применения фильтра по производителю и возврата на первую страницу каталога кнопка "Next" исчезает. Для восстановления возможности перехода на следующую страницу необходимо обновить страницу
      
- summary: |
      После изменения фильтра "In Stock" отображаемые товары не соответствуют выбранному состоянию фильтра
    environment: |
      Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть приложение https://products-store-v2.hexlet.app/
      2. Перейти на последующую страницу каталога
      3. Изменить состояние фильтра "In Stock"
      4. Перейти на предыдущие страницы каталога
    expected-result: |
      Состояние фильтра "In Stock" сохраняется, а отображаемые товары соответствуют выбранному состоянию фильтра
    actual-result: |
      После перехода между страницами состояние фильтра и отображаемые товары становятся несогласованными. Отображаются товары, не соответствующие выбранному состоянию фильтра. После возврата на первую страницу также исчезает кнопка "Next"
      
- summary: |
      После перехода из корзины в каталог выбранный язык интерфейса сбрасывается на английский
    environment: |
      Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть приложение https://products-store-v2.hexlet.app/
      2. Переключить язык интерфейса на русский
      3. Перейти в корзину
      4. Нажать кнопку "Магазин" для возврата в каталог
    expected-result: |
      После перехода в каталог выбранный язык интерфейса сохраняется. Интерфейс продолжает отображаться на русском языке
    actual-result: |
      После перехода из корзины в каталог интерфейс отображается на английском языке

