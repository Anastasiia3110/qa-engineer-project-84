bugreports:
  - summary: |
      После ввода поискового запроса исчезает кнопка Next
    environment: |
      Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
      2. Ввести в поле поиска значение "milk"
      3. Проверить элементы навигации
    expected-result: |
      Кнопка Next отображается, если существуют следующие страницы каталога
    actual-result: |
      После ввода поискового запроса кнопка Next исчезает, перейти на следующую страницу невозможно
