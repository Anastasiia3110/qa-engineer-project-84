bugreports:
  - summary: |
      После ввода поискового запроса исчезает кнопка Next
    environment: |
      Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
      2. Ввести в поле поиска значение "milk"
      3. Проверить элементы навигации
    expected-result: |
      Кнопка Next отображается, если существуют следующие страницы каталога
    actual-result: |
      После ввода поискового запроса кнопка Next исчезает, перейти на следующую страницу невозможно

      - summary: |
      После выбора категории исчезает кнопка Next
    environment: |
      Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
      2. Убедиться, что кнопка Next отображается
      3. Выбрать любую категорию из списка Category
      4. Проверить наличие кнопки Next
    expected-result: |
      Кнопка Next остается доступной, если после выбора категории существуют следующие страницы с товарами
    actual-result: |
      После выбора категории кнопка Next исчезает. Перейти к следующей странице товаров невозможно

      - summary: |
      После возврата на первую страницу с выбранным фильтром по бренду не отображается кнопка Next
    environment: |
      Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
      2. Перейти на 3-ю или 4-ю страницу каталога
      3. Выбрать любой бренд
      4. Вернуться на первую страницу с помощью кнопки Previous
      5. Проверить отображение кнопки Next
    expected-result: |
      На первой странице отображается кнопка Next, если существуют следующие страницы каталога
    actual-result: |
      После возврата на первую страницу с выбранным фильтром по бренду кнопка Next отсутствует, несмотря на наличие следующих страниц каталога. После обновления страницы кнопка Next снова отображается

      - summary: |
      После установки диапазона цен исчезает кнопка Next
    environment: |
      Google Chrome 149.0.7827.158 (официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть главную страницу интернет-магазина https://products-store.hexlet.app
      2. Установить диапазон цен
      3. Проверить отображение кнопки Next
    expected-result: |
      После применения диапазона цен кнопка Next отображается, если существуют следующие страницы с товарами
    actual-result: |
      После применения диапазона цен кнопка Next отсутствует. Перейти к следующей странице каталога невозможно
