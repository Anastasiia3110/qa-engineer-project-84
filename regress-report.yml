bugreports:
  - summary: |
      После выбора производителя исчезает кнопка Next
    environment: |
      Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть приложение https://products-store-v2.hexlet.app/
      2. Выбрать любого производителя
      3. Попытаться перейти на следующую страницу
      4. Вернуться на предыдущую страницу
    expected-result: |
      После выбора производителя кнопки перехода между страницами работают корректно
    actual-result: |
      После выбора производителя кнопка Next исчезает. После возврата на предыдущую страницу кнопка Next не появляется. Для продолжения работы необходимо обновить страницу
      
