bugreports:
  - summary: |
      После выбора категории исчезает кнопка Next и невозможно продолжить просмотр товаров
    environment: |
      Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть приложение https://products-store-v2.hexlet.app/
      2. Выбрать любую категорию
      3. Просмотреть список товаров
      4. Попытаться перейти к следующим товарам
    expected-result: |
      При наличии товаров выбранной категории на следующих страницах кнопка Next отображается и позволяет перейти к ним
    actual-result: |
      После выбора категории кнопка Next исчезает, из-за чего невозможно перейти к следующим товарам выбранной категории

