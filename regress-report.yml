- summary: |
      Некорректно отображается символ валюты в корзине на мобильном устройстве
    environment: |
      Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть приложение в Mobile View DevTools (iPhone XR 414×896)
      2. Добавить товар в корзину
      3. Открыть корзину
    expected-result: |
      Стоимость заказа отображается корректно, символ валюты расположен рядом со стоимостью
    actual-result: |
      Символ "$" отображается на отдельной строке под общей стоимостью заказа

- summary: |
      При поиске несуществующего товара отображается каталог вместо сообщения об отсутствии результатов
    environment: |
      Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть приложение в Mobile View DevTools (iPhone XR 414×896)
      2. Ввести в поле поиска значение, которому не соответствует ни один товар (например, "cica123")
      3. Проверить результаты поиска
    expected-result: |
      Отображается сообщение о том, что товары не найдены. Каталог не содержит товаров
    actual-result: |
      Каталог товаров не изменяется. Отображаются товары, словно поиск не выполняется. Сообщение об отсутствии результатов не отображается

- summary: |
      Карточка товара открывается только при нажатии на изображение товара
    environment: |
      Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    steps-to-reproduce: |
      1. Открыть приложение
      2. На странице каталога выбрать любой товар
      3. Нажать на название товара
      4. Нажать на описание товара
      5. Нажать на свободную область карточки товара
    expected-result: |
      Карточка товара открывается при нажатии на любую область карточки товара
    actual-result: |
      Карточка товара открывается только при нажатии на изображение товара. При нажатии на название, описание и свободную область карточки переход не выполняется
