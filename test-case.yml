---
- summary: |
    Поиск товара по ключевому слову
  requirement: |
    При вводе ключевого слова в поисковую строку пользователь должен видеть релевантные товары
  prerequisites: |
    Открыта главная страница интернет-магазина
  test-data: |
    Тестовые данные
    Ключевое слово: "powder"
  steps:
    - Ввести в поле поиска ключевое слово "powder"
  expected-result: |
    Отображаются товары, соответствующие запросу

summary: |
