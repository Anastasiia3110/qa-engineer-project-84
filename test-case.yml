---
- summary: |
    Поиск товара по ключевому слову
  requirement: |
    При вводе ключевого слова в поисковую строку пользователь должен видеть релевантные товары
  prerequisites: |
    Открыта главная страница интернет-магазина
  test-data: |
    Тестовые данные
    Ключевое слово: "powder"
  steps:
    - Ввести в поле поиска ключевое слово "powder"
  expected-result: |
    Отображаются товары, соответствующие запросу

summary: |
    Поиск товара по категории
  requirement: |
    При выборе категории в выпадаюющем списке пользователь должен видеть товары данной категории
  prerequisites: |
    Открыта главная страница интернет-магазина
  test-data: |
    Тестовые данные
    Категория: "beauty"
  steps:
    - Нажать на выпадающий список "category"
    - Выбрать категорию "beauty"
  expected-result: |
    Отображаются товары выбранной категории

